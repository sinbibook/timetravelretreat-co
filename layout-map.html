<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="애월 곽지해수욕장 인근 제주 시간여행 키즈 가족 휴양 펜션입니다. 아이들을 위한 키즈 객실, 넓은 가족실 등 모든 단위 고객 방문 가능합니다.">
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/layout-map.css" as="style">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/layout-map.css">
    <link rel="stylesheet" href="styles/theme.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="제주 시간여행 키즈 가족 휴양 펜션" />
  <meta property="og:description" content="애월 곽지해수욕장 인근 제주 시간여행 키즈 가족 휴양 펜션입니다. 아이들을 위한 키즈 객실, 넓은 가족실 등 모든 단위 고객 방문 가능합니다." />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/02/nuEwf5I4hH93.jpg" />
  <meta property="og:url" content="https://timetravelretreat.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="제주 시간여행 키즈 가족 휴양 펜션" />
  <meta name="twitter:description" content="애월 곽지해수욕장 인근 제주 시간여행 키즈 가족 휴양 펜션입니다. 아이들을 위한 키즈 객실, 넓은 가족실 등 모든 단위 고객 방문 가능합니다." />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/02/nuEwf5I4hH93.jpg" />
</head>
<body>
    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-background">
            <!-- Custom-field layout-map-hero-image-0 -->
            <img src="" alt="배치도 배경" data-layout-map-hero-image>
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-content">
            <div class="hero-text-center">
                <!-- 하드코딩 fixed -->
                <h1 class="hero-title">숙소 배치도</h1>
            </div>
        </div>

        <!-- Scroll Down Indicator -->
        <div class="hero-scroll-down" onclick="scrollToNextSection()">
            <svg class="scroll-arrow" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
            </svg>
        </div>
    </section>

    <main class="layout-map-container">
        <!-- Custom-field layout-map-hero-title -->
        <div class="layout-map-intro">
            <h2 class="layout-map-title" data-layout-map-about-title></h2>
            <!-- Custom-field layout-map-hero-description -->
            <p class="layout-map-description" data-layout-map-about-description></p>
        </div>

        <!-- Layout Map About Section - 이미지와 설명이 교대로 -->
        <div class="layout-map-content" id="layout-map-content-container">
            <!-- Image Item 1 -->
            <div class="layout-map-item">
                <!-- Custom-field: layout-map.sections[0].about.images[0] -->
                <img alt="배치도" class="layout-map-image" data-layout-map-image-0>
            </div>

            <!-- Description Item 1 -->
            <div class="layout-map-description-item">
                <!-- Custom-field: layout-map.sections[0].about.description[0] -->
                <p data-layout-map-description-0></p>
            </div>
        </div>
    </main>

    <!-- Closing Section -->
    <section class="layout-closing">
        <div class="layout-closing-bg" style="background-size: cover; background-position: center;" data-layout-map-closing-image-bg></div>
        <div class="layout-closing-overlay">
            <div class="layout-closing-content">
                <img src="" alt="로고" class="closing-logo" data-closing-logo="">
            </div>
        </div>
    </section>

    <!-- Include Footer -->
    <div id="footer-placeholder"></div>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Common Slider Module -->
    <script src="js/common/slider.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Layout Map Mapper -->
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/layout-map.js"></script>

</body>
</html>
